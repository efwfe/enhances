# ============================================================
# YOLO 数据集配置（用于 demo/yolo_training.py）
# ============================================================
# 完整文档：https://docs.ultralytics.com/datasets/

# 数据集根目录（所有相对路径基于此）
path: /path/to/your/dataset

# 图片目录（相对于 path）
train: images/train
val: images/val
test: images/test       # 可选

# 类别数
nc: 3

# 类别名称（下标即 class_id）
names:
  0: cat
  1: dog
  2: bird

# ── 内置增强参数（Ultralytics hyp）──────────────────────────
# 与 data_enhance 自定义增强并行生效
# 如果启用 demo 中的 --use-mosaic，需将下面的 mosaic 设为 0.0
# mosaic: 0.0    # ← 使用自定义 Mosaic 时取消注释

# ── 典型目录结构 ────────────────────────────────────────────
#
# /path/to/your/dataset/
# ├── images/
# │   ├── train/
# │   │   ├── img001.jpg
# │   │   └── img002.jpg
# │   ├── val/
# │   │   └── img003.jpg
# │   └── test/           # 可选
# ├── labels/
# │   ├── train/
# │   │   ├── img001.txt  # 每行: <class_id> <xc> <yc> <w> <h> (归一化)
# │   │   └── img002.txt
# │   ├── val/
# │   │   └── img003.txt
# │   └── test/
# └── dataset.yaml        # 本文件
#
# 标注文件格式（labels/*.txt）:
#   0 0.500 0.400 0.300 0.500
#   1 0.200 0.700 0.150 0.200
#   ^cls  ^xc   ^yc   ^w    ^h   （全部归一化到 [0, 1]）
